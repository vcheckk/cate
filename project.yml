name: CanvasIDE
options:
  bundleIdPrefix: com.canvaside
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_OBJC_BRIDGING_HEADER: CanvasIDE/CanvasIDE-Bridging-Header.h
    FRAMEWORK_SEARCH_PATHS:
      - "$(PROJECT_DIR)"

targets:
  CanvasIDE:
    type: application
    platform: macOS
    sources:
      - path: CanvasIDE
        excludes:
          - "**/*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canvaside.app
        PRODUCT_NAME: CanvasIDE
        INFOPLIST_FILE: CanvasIDE/Info.plist
        CODE_SIGN_ENTITLEMENTS: CanvasIDE/CanvasIDE.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: true
      - package: Highlightr
      - package: Sparkle

packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.1"
